<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Acceso — Iglesia</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <style>
    :root {
      --primary: #1D9E75;
      --primary-l: #E1F5EE;
      --primary-d: #0F6E56;
      --primary-s: rgba(29, 158, 117, 0.12);
      --red: #A32D2D;
      --red-l: #FCEBEB;
      --bg: #F8F9FA;
      --surface: #FFFFFF;
      --border: rgba(0, 0, 0, 0.08);
      --text: #1a1a18;
      --text2: #6B7280;
      --text3: #9CA3AF;
      --radius: 16px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 32px rgba(0,0,0,0.12);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --surface: #1a1a18;
        --border: rgba(255,255,255,0.08);
        --text: #F3F4F6;
        --text2: #9CA3AF;
        --text3: #6B7280;
        --primary-l: #04342C;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, 'Segoe UI', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
      -webkit-font-smoothing: antialiased;
    }

    .login-container {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      animation: fadeUp 0.4s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-section {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    .logo-icon {
      width: 80px;
      height: 80px;
      border-radius: 24px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow);
      background: var(--surface);
    }

    .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .welcome-text {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .welcome-title {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .welcome-sub {
      font-size: 15px;
      color: var(--text2);
    }

    .card {
      width: 100%;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 28px 24px;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      color: var(--text3);
      display: flex;
      align-items: center;
      pointer-events: none;
    }

    .input-field {
      width: 100%;
      padding: 14px 14px 14px 44px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-field::placeholder {
      color: var(--text3);
    }

    .input-field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-s);
    }

    .btn-eye {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text3);
      padding: 4px;
      display: flex;
      align-items: center;
      font-size: 16px;
    }

    .btn-eye:hover {
      color: var(--text2);
    }

    .btn-primary {
      width: 100%;
      padding: 15px;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.15s;
      box-shadow: 0 4px 12px rgba(29, 158, 117, 0.25);
      margin-top: 4px;
    }

    .btn-primary:hover {
      background: var(--primary-d);
      box-shadow: 0 6px 16px rgba(29, 158, 117, 0.3);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(29, 158, 117, 0.2);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .error-msg {
      background: var(--red-l);
      color: var(--red);
      border-radius: var(--radius-xs);
      padding: 12px 14px;
      font-size: 13px;
      display: none;
      border: 1px solid rgba(163, 45, 45, 0.1);
    }

    .error-msg.show {
      display: block;
      animation: shake 0.3s ease;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .links a {
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      padding: 4px 8px;
      border-radius: var(--radius-xs);
      transition: background 0.15s;
    }

    .links a:hover {
      background: var(--primary-s);
    }

    .footer {
      font-size: 11px;
      color: var(--text3);
      text-align: center;
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="logo-section">
    <div class="logo-icon">
      <img src="/logo.png" alt="Logo Iglesia">
    </div>
    <div class="welcome-text">
      <div class="welcome-title">Bienvenido</div>
      <div class="welcome-sub">Accede al sistema de asistencia</div>
    </div>
  </div>

  <div class="card">
    <div class="error-msg" id="error-msg"></div>

    <div class="form-group">
      <label class="form-label">Correo electrónico</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
        </span>
        <input type="email" class="input-field" id="email" placeholder="tu@correo.com" autocomplete="email">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Contraseña</label>
      <div class="input-wrap">
        <span class="input-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        </span>
        <input type="password" class="input-field" id="password" placeholder="••••••••" autocomplete="current-password">
        <button class="btn-eye" tabindex="-1" id="eye-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
    </div>

    <button class="btn-primary" id="btn-login">
      <span id="btn-txt">Ingresar</span>
    </button>

    <div class="links">
      <a href="/olvide-password.html">¿Olvidaste tu contraseña?</a>
    </div>
  </div>

  <div class="footer">Sistema de Gestión Iglesia · v1.0</div>
</div>

<script>
const SUPABASE_URL = 'https://cbpaofgpqwcrcpzldnch.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNicGFvZmdwcXdjcmNwemxkbmNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjkxMTIsImV4cCI6MjA4OTY0NTExMn0.wxM0JDa02wBd1BZD05kqOSsZh5xSGsf9tV_hoxWopcY';

function togglePwd() {
  const inp = document.getElementById('password');
  const eye = document.getElementById('eye-btn');
  if (inp.type === 'password') {
    inp.type = 'text';
    eye.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></svg>';
  } else {
    inp.type = 'password';
    eye.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>';
  }
}

function setLoading(on) {
  const btn = document.getElementById('btn-login');
  const txt = document.getElementById('btn-txt');
  btn.disabled = on;
  txt.innerHTML = on ? '<div class="spinner"></div>' : 'Ingresar';
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('show');
}

function hideError() {
  document.getElementById('error-msg').classList.remove('show');
}

async function login() {
  hideError();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email) { showError('Ingresa tu correo electrónico'); return; }
  if (!password) { showError('Ingresa tu contraseña'); return; }

  setLoading(true);
  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (!res.ok) {
      showError(data.error_description || data.msg || 'Correo o contraseña incorrectos');
      setLoading(false);
      return;
    }

    localStorage.setItem('iglesia_token', data.access_token);
    localStorage.setItem('iglesia_refresh', data.refresh_token);
    localStorage.setItem('iglesia_user', JSON.stringify(data.user));

    const perfil = await fetch('/api/auth/perfil', {
      headers: { 'Authorization': 'Bearer ' + data.access_token }
    });
    const perfilData = await perfil.json();
    if (perfilData.data) {
      localStorage.setItem('iglesia_perfil', JSON.stringify(perfilData.data));
    }

    const rol = perfilData.data?.rol || 'portero';
    const destinos = {
      admin: '/porteria.html',
      pastor: '/porteria.html',
      portero: '/porteria.html',
      tesorero: '/porteria.html'
    };
    window.location.href = destinos[rol] || '/porteria.html';

  } catch (e) {
    showError('Error de conexión. Verifica tu internet.');
    setLoading(false);
  }
}

document.getElementById('btn-login').addEventListener('click', login);
document.getElementById('eye-btn').addEventListener('click', togglePwd);
document.getElementById('email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password').focus();
});
document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

const token = localStorage.getItem('iglesia_token');
if (token) {
  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    if (payload.exp * 1000 > Date.now()) window.location.href = '/porteria.html';
    else localStorage.clear();
  } catch { localStorage.clear(); }
}
</script>
</body>
</html>
