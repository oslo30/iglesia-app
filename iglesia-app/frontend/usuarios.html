<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Usuarios — Iglesia</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <style>
    :root {
      --primary: #00519A;
      --primary-l: #E8F0F8;
      --primary-d: #003A6B;
      --primary-s: rgba(0, 81, 154, 0.12);
      --amber: #BA7517;
      --amber-l: #FAEEDA;
      --blue: #185FA5;
      --blue-l: #E6F1FB;
      --red: #A32D2D;
      --red-l: #FCEBEB;
      --gray: #6B7280;
      --gray-l: #F1F3F5;
      --bg: #F8F9FA;
      --surface: #FFFFFF;
      --border: rgba(0, 0, 0, 0.06);
      --text: #1a1a18;
      --text2: #6B7280;
      --text3: #9CA3AF;
      --radius: 16px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --radius-full: 999px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.1);
      --shadow-card: 0 2px 8px rgba(0,0,0,0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --surface: #1a1a18;
        --border: rgba(255,255,255,0.08);
        --text: #F3F4F6;
        --text2: #9CA3AF;
        --text3: #6B7280;
        --gray-l: #242422;
        --primary-l: #04342C;
        --amber-l: #2A1E06;
        --blue-l: #061A30;
        --red-l: #2A0E0E;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent }

    body {
      font-family: -apple-system, 'Segoe UI', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      background: var(--bg);
    }

    /* ── HEADER ── */
    .header {
      background: var(--surface);
      padding: 16px 16px 0;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--primary);
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      font-weight: 500;
      text-decoration: none;
    }

    /* ── CONTENT ── */
    .content {
      padding: 16px;
      padding-bottom: 100px;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text3);
      margin: 16px 0 10px;
      padding: 0 4px;
    }

    /* ── USER CARDS ── */
    .user-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-card);
      border: 1px solid var(--border);
    }

    .user-card-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .user-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--blue-l);
      color: var(--blue);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .user-info {
      flex: 1;
      min-width: 0;
    }

    .user-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
    }

    .user-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 6px;
      flex-wrap: wrap;
    }

    .rol-badge {
      font-size: 10px;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-weight: 500;
    }

    .rol-admin { background: var(--primary-s); color: var(--primary-d); }
    .rol-pastor { background: var(--blue-l); color: var(--blue); }
    .rol-portero { background: var(--gray-l); color: var(--gray); }
    .rol-tesorero { background: var(--amber-l); color: #854F0B; }

    .activo-badge {
      font-size: 10px;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      background: var(--primary-s);
      color: var(--primary-d);
      font-weight: 500;
    }

    .inactivo-badge {
      font-size: 10px;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      background: var(--red-l);
      color: var(--red);
      font-weight: 500;
    }

    .user-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    /* ── BUTTONS ── */
    .btn-primary {
      width: 100%;
      padding: 15px;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary:active {
      opacity: 0.85;
      transform: scale(0.98);
    }

    .btn-secondary {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-secondary:active {
      background: var(--gray-l);
    }

    .btn-sm {
      padding: 10px 16px;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-sm:active {
      background: var(--gray-l);
      transform: scale(0.95);
    }

    /* ── INPUTS ── */
    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 6px;
      display: block;
    }

    .input-field {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-s);
    }

    select.input-field {
      cursor: pointer;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(2px);
    }

    .modal-overlay.show {
      display: flex;
      animation: fadeIn 0.2s ease;
    }

    .modal {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 20px 36px;
      width: 100%;
      max-width: 480px;
      max-height: 88vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    /* ── EMPTY & LOADING ── */
    .loading {
      text-align: center;
      padding: 48px 20px;
      color: var(--text2);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text2);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    /* ── ACCESS DENIED ── */
    .access-denied {
      text-align: center;
      padding: 48px 24px;
    }

    .access-denied-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .access-denied-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .access-denied-sub {
      font-size: 14px;
      color: var(--text2);
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: var(--bg);
      padding: 12px 24px;
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .toast.error {
      background: var(--red);
    }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      border: none;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(29, 158, 117, 0.35);
      transition: all 0.2s;
      z-index: 50;
    }

    .fab:active {
      transform: scale(0.92);
      box-shadow: 0 4px 12px rgba(29, 158, 117, 0.25);
    }
  </style>
</head>
<body>

<script>
(function() {
  const token = localStorage.getItem('iglesia_token');
  if (!token) { window.location.href = '/login.html'; return; }
  try {
    const p = JSON.parse(atob(token.split('.')[1]));
    if (p.exp * 1000 < Date.now()) { localStorage.clear(); window.location.href = '/login.html'; }
  } catch { window.location.href = '/login.html'; }
})();

const _origFetch = window.fetch;
window.fetch = function(url, opts = {}) {
  if (typeof url === 'string' && url.startsWith('/api')) {
    const token = localStorage.getItem('iglesia_token');
    if (token) opts.headers = { ...opts.headers, 'Authorization': 'Bearer ' + token };
  }
  return _origFetch(url, opts);
};
</script>

<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="header-left">
        <a href="/porteria.html" class="back-btn">← Volver</a>
      </div>
    </div>
    <div class="header-title" style="margin-bottom:12px">Usuarios</div>
  </div>

  <div class="content" id="main-content">
    <div class="loading"><div class="spinner"></div>Cargando usuarios...</div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="abrirModalNuevo()">+</button>

<!-- Modal editar usuario -->
<div class="modal-overlay" id="modal-usuario">
  <div class="modal">
    <div class="modal-title" id="modal-titulo">Editar usuario</div>

    <div class="form-group">
      <label class="form-label">Nombre</label>
      <input type="text" class="input-field" id="u-nombre" placeholder="Nombre completo">
    </div>

    <div class="form-group">
      <label class="form-label">Rol</label>
      <select class="input-field" id="u-rol">
        <option value="portero">Ujier</option>
        <option value="pastor">Pastor</option>
        <option value="tesorero">Tesorero</option>
        <option value="admin">Administrador</option>
      </select>
    </div>

    <div class="form-group" id="u-activo-wrap">
      <label class="form-label">Estado</label>
      <select class="input-field" id="u-activo">
        <option value="true">Activo</option>
        <option value="false">Inactivo</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="btn-primary" style="flex:1" onclick="guardarUsuario()">Guardar</button>
      <button class="btn-secondary" style="flex:1" onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>
</div>

<!-- Modal nuevo usuario -->
<div class="modal-overlay" id="modal-nuevo">
  <div class="modal">
    <div class="modal-title">Crear nuevo usuario</div>

    <div class="form-group">
      <label class="form-label">Nombre completo</label>
      <input type="text" class="input-field" id="n-nombre" placeholder="Nombre y apellido">
    </div>

    <div class="form-group">
      <label class="form-label">Correo electrónico</label>
      <input type="email" class="input-field" id="n-email" placeholder="correo@iglesia.com">
    </div>

    <div class="form-group">
      <label class="form-label">Contraseña temporal</label>
      <input type="text" class="input-field" id="n-password" placeholder="Mínimo 8 caracteres" value="Iglesia2024!">
    </div>

    <div class="form-group">
      <label class="form-label">Rol</label>
      <select class="input-field" id="n-rol">
        <option value="portero">Ujier</option>
        <option value="pastor">Pastor</option>
        <option value="tesorero">Tesorero</option>
        <option value="admin">Administrador</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="btn-primary" style="flex:1" onclick="crearUsuario()">Crear usuario</button>
      <button class="btn-secondary" style="flex:1" onclick="cerrarModalNuevo()">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
let usuarios = [];
let editandoId = null;
const perfil = JSON.parse(localStorage.getItem('iglesia_perfil') || '{}');

async function api(method, path, body) {
  const r = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || 'Error');
  return j.data ?? j;
}

function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

function cerrarModal() {
  document.getElementById('modal-usuario').classList.remove('show');
}

function cerrarModalNuevo() {
  document.getElementById('modal-nuevo').classList.remove('show');
}

const ROL_LABEL = { admin:'Administrador', pastor:'Pastor', portero:'Ujier', tesorero:'Tesorero' };

function iniciales(nombre) {
  return (nombre || '?').split(' ').map(p => p[0]).join('').toUpperCase().slice(0,2);
}

async function cargarUsuarios() {
  const content = document.getElementById('main-content');

  // Verificar que sea admin
  if (perfil.rol !== 'admin') {
    content.innerHTML = `<div class="access-denied">
      <div class="access-denied-icon">🔒</div>
      <div class="access-denied-title">Acceso restringido</div>
      <div class="access-denied-sub">Solo los administradores pueden gestionar usuarios.</div>
    </div>`;
    return;
  }

  try {
    const data = await api('GET', '/auth/usuarios');
    usuarios = Array.isArray(data) ? data : [];
    renderUsuarios();
  } catch (e) {
    content.innerHTML = `<div class="empty"><div class="empty-icon">⚠️</div><p>Error al cargar</p></div>`;
  }
}

function renderUsuarios() {
  const content = document.getElementById('main-content');
  if (!usuarios.length) {
    content.innerHTML = '<div class="empty"><div class="empty-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--text3)" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></div><p>No hay usuarios registrados</p></div>';
    return;
  }

  const activos = usuarios.filter(u => u.activo);
  const inactivos = usuarios.filter(u => !u.activo);

  let html = '';

  if (activos.length) {
    html += `<div class="section-label">Activos (${activos.length})</div>`;
    html += activos.map(u => userCard(u)).join('');
  }
  if (inactivos.length) {
    html += `<div class="section-label">Inactivos (${inactivos.length})</div>`;
    html += inactivos.map(u => userCard(u)).join('');
  }

  content.innerHTML = html;
}

function userCard(u) {
  const nombre = u.nombre_display || u.miembros
    ? (u.miembros?.nombre || '') + ' ' + (u.miembros?.apellido || '')
    : '—';
  const nombre2 = nombre.trim() || 'Sin nombre';
  return `<div class="user-card">
    <div class="user-card-header">
      <div class="user-avatar">${iniciales(nombre2)}</div>
      <div class="user-info">
        <div class="user-name">${nombre2}</div>
        <div class="user-meta">
          <span class="rol-badge rol-${u.rol}">${ROL_LABEL[u.rol] || u.rol}</span>
          ${u.activo
            ? '<span class="activo-badge">Activo</span>'
            : '<span class="inactivo-badge">Inactivo</span>'}
        </div>
      </div>
    </div>
    <div class="user-actions">
      <button class="btn-sm" style="flex:1" onclick="abrirModalEditar('${u.id}')">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg> Editar
      </button>
    </div>
  </div>`;
}

function abrirModalEditar(id) {
  const u = usuarios.find(x => x.id === id);
  if (!u) return;
  editandoId = id;
  const nombre = u.nombre_display || '';
  document.getElementById('modal-titulo').textContent = 'Editar usuario';
  document.getElementById('u-nombre').value = nombre;
  document.getElementById('u-rol').value = u.rol;
  document.getElementById('u-activo').value = u.activo ? 'true' : 'false';
  document.getElementById('modal-usuario').classList.add('show');
}

async function guardarUsuario() {
  const nombre = document.getElementById('u-nombre').value.trim();
  const rol = document.getElementById('u-rol').value;
  const activo = document.getElementById('u-activo').value === 'true';

  try {
    await api('PATCH', `/auth/usuarios/${editandoId}`, { rol, activo, nombre_display: nombre });
    const idx = usuarios.findIndex(u => u.id === editandoId);
    if (idx !== -1) usuarios[idx] = { ...usuarios[idx], rol, activo, nombre_display: nombre };
    renderUsuarios();
    cerrarModal();
    toast('Usuario actualizado');
  } catch (e) {
    toast('Error: ' + e.message, true);
  }
}

function abrirModalNuevo() {
  document.getElementById('n-nombre').value = '';
  document.getElementById('n-email').value = '';
  document.getElementById('n-password').value = 'Iglesia2024!';
  document.getElementById('n-rol').value = 'portero';
  document.getElementById('modal-nuevo').classList.add('show');
}

async function crearUsuario() {
  const nombre = document.getElementById('n-nombre').value.trim();
  const email = document.getElementById('n-email').value.trim();
  const password = document.getElementById('n-password').value.trim();
  const rol = document.getElementById('n-rol').value;

  if (!nombre || !email || !password) { toast('Completa todos los campos', true); return; }

  try {
    await api('POST', '/auth/usuarios', { email, password, rol, nombre_display: nombre });
    cerrarModalNuevo();
    toast('Usuario creado correctamente');
    cargarUsuarios();
  } catch (e) {
    toast('Error: ' + e.message, true);
  }
}

cargarUsuarios();
</script>
</body>
</html>
