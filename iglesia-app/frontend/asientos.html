<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Asientos — Iglesia</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <style>
    :root {
      --primary: #1D9E75;
      --primary-l: #E1F5EE;
      --primary-d: #0F6E56;
      --primary-s: rgba(29, 158, 117, 0.12);
      --amber: #BA7517;
      --amber-l: #FAEEDA;
      --blue: #185FA5;
      --blue-l: #E6F1FB;
      --red: #A32D2D;
      --red-l: #FCEBEB;
      --gray: #6B7280;
      --gray-l: #F1F3F5;
      --bg: #F8F9FA;
      --surface: #FFFFFF;
      --border: rgba(0, 0, 0, 0.06);
      --text: #1a1a18;
      --text2: #6B7280;
      --text3: #9CA3AF;
      --radius: 16px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --radius-full: 999px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.1);
      --shadow-card: 0 2px 8px rgba(0,0,0,0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --surface: #1a1a18;
        --border: rgba(255,255,255,0.08);
        --text: #F3F4F6;
        --text2: #9CA3AF;
        --text3: #6B7280;
        --gray-l: #242422;
        --primary-l: #04342C;
        --amber-l: #2A1E06;
        --blue-l: #061A30;
        --red-l: #2A0E0E;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent }

    body {
      font-family: -apple-system, 'Segoe UI', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      background: var(--bg);
    }

    /* ── HEADER ── */
    .header {
      background: var(--surface);
      padding: 16px 16px 0;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--primary);
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      font-weight: 500;
      text-decoration: none;
    }

    .btn-exit {
      background: var(--gray-l);
      border: none;
      color: var(--text2);
      font-size: 11px;
      padding: 6px 12px;
      border-radius: var(--radius-xs);
      cursor: pointer;
      font-weight: 500;
      transition: all 0.15s;
    }

    .btn-exit:active {
      background: var(--border);
    }

    /* ── CONTENT ── */
    .content {
      padding: 16px;
      padding-bottom: 100px;
    }

    /* ── SERVICIO SELECT ── */
    .servicio-select {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      outline: none;
      cursor: pointer;
      margin-bottom: 16px;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .servicio-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-s);
    }

    /* ── STATS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 14px 12px;
      text-align: center;
      box-shadow: var(--shadow-card);
      border: 1px solid var(--border);
    }

    .stat-val {
      font-size: 24px;
      font-weight: 700;
      line-height: 1;
    }

    .stat-lbl {
      font-size: 10px;
      color: var(--text2);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── ZONE ── */
    .zone-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text2);
      margin: 16px 0 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .zone-badge {
      background: var(--gray-l);
      border: 1px solid var(--border);
      padding: 2px 10px;
      border-radius: var(--radius-full);
      font-size: 10px;
      font-weight: 500;
    }

    /* ── ASIENTOS GRID ── */
    .asiento-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }

    .asiento {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-xs);
      border: 1.5px solid var(--border);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      user-select: none;
    }

    .asiento:active {
      transform: scale(0.9);
    }

    .asiento-libre {
      background: var(--surface);
      color: var(--text2);
      border-color: var(--border);
    }

    .asiento-libre:hover {
      background: var(--primary-l);
      border-color: var(--primary);
    }

    .asiento-ocupado {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }

    .asiento-reservado {
      background: var(--amber);
      color: #fff;
      border-color: var(--amber);
    }

    /* ── LEYENDA ── */
    .leyenda {
      display: flex;
      gap: 16px;
      padding: 12px 0;
      border-top: 1px solid var(--border);
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .leyenda-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text2);
    }

    .leyenda-dot {
      width: 16px;
      height: 16px;
      border-radius: 4px;
    }

    /* ── BUTTONS ── */
    .btn-primary {
      width: 100%;
      padding: 15px;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary:active {
      opacity: 0.85;
      transform: scale(0.98);
    }

    .btn-secondary {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-secondary:active {
      background: var(--gray-l);
    }

    .btn-danger {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--red);
      background: transparent;
      color: var(--red);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }

    .btn-sm {
      padding: 8px 14px;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-sm:active {
      background: var(--gray-l);
      transform: scale(0.95);
    }

    /* ── INPUTS ── */
    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 6px;
      display: block;
    }

    .input-field {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-s);
    }

    select.input-field {
      cursor: pointer;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(2px);
    }

    .modal-overlay.show {
      display: flex;
      animation: fadeIn 0.2s ease;
    }

    .modal {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 20px 36px;
      width: 100%;
      max-width: 480px;
      max-height: 88vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .modal-body {
      font-size: 14px;
      color: var(--text2);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    /* ── EMPTY & LOADING ── */
    .loading {
      text-align: center;
      padding: 48px 20px;
      color: var(--text2);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text2);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty p {
      font-size: 14px;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: var(--bg);
      padding: 12px 24px;
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .toast.error {
      background: var(--red);
    }
  </style>
</head>
<body>

<script>
(function() {
  const token = localStorage.getItem('iglesia_token');
  if (!token) { window.location.href = '/login.html'; return; }
  try {
    const p = JSON.parse(atob(token.split('.')[1]));
    if (p.exp * 1000 < Date.now()) { localStorage.clear(); window.location.href = '/login.html'; }
  } catch { window.location.href = '/login.html'; }
})();

const _origFetch = window.fetch;
window.fetch = function(url, opts = {}) {
  if (typeof url === 'string' && url.startsWith('/api')) {
    const token = localStorage.getItem('iglesia_token');
    if (token) opts.headers = { ...opts.headers, 'Authorization': 'Bearer ' + token };
  }
  return _origFetch(url, opts);
};
</script>

<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="header-left">
        <a href="/porteria.html" class="back-btn">← Volver</a>
      </div>
      <button class="btn-exit" onclick="resetAsientos()">Liberar todos</button>
    </div>
    <div class="header-title" style="margin-bottom:12px">Asientos</div>
  </div>

  <div class="content">
    <select class="servicio-select" id="servicio-select" onchange="cargarAsientos()">
      <option value="">— Selecciona un servicio —</option>
    </select>

    <div id="main-content">
      <div class="empty">
        <div class="empty-icon">🪑</div>
        <p>Selecciona un servicio para ver los asientos</p>
      </div>
    </div>
  </div>
</div>

<!-- Modal confirmar reset -->
<div class="modal-overlay" id="modal-reset">
  <div class="modal">
    <div class="modal-title">¿Liberar todos los asientos?</div>
    <div class="modal-body">Se marcarán todos los asientos como libres para el servicio seleccionado.</div>
    <div class="modal-actions">
      <button class="btn-danger" style="flex:1" onclick="confirmarReset()">Sí, liberar</button>
      <button class="btn-secondary" style="flex:1" onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
let asientos = [];
let servicioSeleccionado = null;
let serviciosDelDia = [];

async function api(method, path, body) {
  const r = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || 'Error');
  return j.data ?? j;
}

function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

function cerrarModal() {
  document.getElementById('modal-reset').classList.remove('show');
}

function estadoLabel(estado) {
  const map = { libre: 'Libre', ocupado: 'Ocupado', reservado: 'Reservado' };
  return map[estado] || 'Libre';
}

function estadoClass(estado) {
  return 'asiento-' + (estado || 'libre');
}

function estadoEmoji(estado) {
  const map = { libre: '', ocupado: '●', reservado: '◆' };
  return map[estado] || '';
}

function renderAsientos() {
  const main = document.getElementById('main-content');
  if (!servicioSeleccionado) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">🪑</div><p>Selecciona un servicio para ver los asientos</p></div>`;
    return;
  }

  if (!asientos.length) {
    main.innerHTML = `<div class="empty"><div class="empty-icon">🪑</div><p>Este servicio no tiene asientos configurados</p></div>`;
    return;
  }

  // Agrupar por zona
  const porZona = {};
  asientos.forEach(a => {
    const zona = a.zona || 'General';
    if (!porZona[zona]) porZona[zona] = [];
    porZona[zona].push(a);
  });

  // Stats
  const libres = asientos.filter(a => a.estado === 'libre').length;
  const ocupados = asientos.filter(a => a.estado === 'ocupado').length;
  const reservados = asientos.filter(a => a.estado === 'reservado').length;

  let html = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val" style="color:var(--primary)">${libres}</div>
        <div class="stat-lbl">Libres</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--gray)">${ocupados}</div>
        <div class="stat-lbl">Ocupados</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--amber)">${reservados}</div>
        <div class="stat-lbl">Reservados</div>
      </div>
    </div>`;

  // Leyenda
  html += `
    <div class="leyenda">
      <div class="leyenda-item"><div class="leyenda-dot asiento-libre"></div> Libre</div>
      <div class="leyenda-item"><div class="leyenda-dot asiento-ocupado"></div> Ocupado</div>
      <div class="leyenda-item"><div class="leyenda-dot asiento-reservado"></div> Reservado</div>
    </div>`;

  // Zonas
  const zonasOrden = Object.keys(porZona).sort();
  zonasOrden.forEach(zona => {
    const zonaAsientos = porZona[zona];
    // Agrupar por fila
    const porFila = {};
    zonaAsientos.forEach(a => {
      const fila = a.fila || '1';
      if (!porFila[fila]) porFila[fila] = [];
      porFila[fila].push(a);
    });

    const filasOrden = Object.keys(porFila).sort((a, b) => Number(a) - Number(b));
    html += `<div class="zone-title">Zona: ${zona} <span class="zone-badge">${zonaAsientos.length}</span></div>`;
    html += `<div class="asiento-grid">`;
    filasOrden.forEach(fila => {
      porFila[fila].sort((a, b) => Number(a.numero) - Number(b.numero)).forEach(asiento => {
        const ec = estadoClass(asiento.estado);
        const emoji = estadoEmoji(asiento.estado);
        const codigo = asiento.codigo || (fila + '-' + asiento.numero);
        html += `<div class="asiento ${ec}" title="${codigo} (${estadoLabel(asiento.estado)})" onclick="toggleAsiento('${asiento.id}')">${emoji || codigo}</div>`;
      });
    });
    html += `</div>`;
  });

  main.innerHTML = html;
}

async function cargarServicios() {
  try {
    const data = await api('GET', '/servicios/hoy');
    serviciosDelDia = Array.isArray(data) ? data : [];
    const sel = document.getElementById('servicio-select');
    serviciosDelDia.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.id;
      const hora = new Date(s.fecha_hora).toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
      opt.textContent = s.nombre + ' — ' + hora;
      sel.appendChild(opt);
    });
  } catch {
    serviciosDelDia = [];
  }
}

async function cargarAsientos() {
  const sel = document.getElementById('servicio-select');
  servicioSeleccionado = sel.value;

  if (!servicioSeleccionado) {
    asientos = [];
    renderAsientos();
    return;
  }

  document.getElementById('main-content').innerHTML = '<div class="loading"><div class="spinner"></div>Cargando asientos...</div>';

  try {
    const data = await api('GET', `/asientos/${servicioSeleccionado}`);
    asientos = Array.isArray(data) ? data : [];
    renderAsientos();
  } catch (e) {
    asientos = [];
    renderAsientos();
  }
}

async function toggleAsiento(asientoId) {
  const asiento = asientos.find(a => a.id === asientoId);
  if (!asiento) return;

  const estados = ['libre', 'ocupado', 'reservado'];
  const idx = estados.indexOf(asiento.estado || 'libre');
  const nuevoEstado = estados[(idx + 1) % 3];

  try {
    await api('PATCH', `/asientos/${servicioSeleccionado}/${asientoId}`, { estado: nuevoEstado });
    asiento.estado = nuevoEstado;
    renderAsientos();
    toast(estadoLabel(nuevoEstado));
  } catch (e) {
    toast(e.message, true);
  }
}

function resetAsientos() {
  if (!servicioSeleccionado) { toast('Selecciona un servicio primero', true); return; }
  document.getElementById('modal-reset').classList.add('show');
}

async function confirmarReset() {
  cerrarModal();
  try {
    await api('POST', `/asientos/${servicioSeleccionado}/reset`);
    toast('Asientos liberados');
    cargarAsientos();
  } catch (e) {
    toast(e.message, true);
  }
}

cargarServicios();
</script>
</body>
</html>
