<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Miembros — Iglesia</title>
  <link rel="icon" type="image/png" href="/logo.png">
  <style>
    :root {
      --primary: #1D9E75;
      --primary-l: #E1F5EE;
      --primary-d: #0F6E56;
      --primary-s: rgba(29, 158, 117, 0.12);
      --amber: #BA7517;
      --amber-l: #FAEEDA;
      --blue: #185FA5;
      --blue-l: #E6F1FB;
      --red: #A32D2D;
      --red-l: #FCEBEB;
      --gray: #6B7280;
      --gray-l: #F1F3F5;
      --bg: #F8F9FA;
      --surface: #FFFFFF;
      --border: rgba(0, 0, 0, 0.06);
      --text: #1a1a18;
      --text2: #6B7280;
      --text3: #9CA3AF;
      --radius: 16px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --radius-full: 999px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
      --shadow: 0 4px 12px rgba(0,0,0,0.08);
      --shadow-lg: 0 8px 24px rgba(0,0,0,0.1);
      --shadow-card: 0 2px 8px rgba(0,0,0,0.06);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --surface: #1a1a18;
        --border: rgba(255,255,255,0.08);
        --text: #F3F4F6;
        --text2: #9CA3AF;
        --text3: #6B7280;
        --gray-l: #242422;
        --primary-l: #04342C;
        --amber-l: #2A1E06;
        --blue-l: #061A30;
        --red-l: #2A0E0E;
      }
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent }

    body {
      font-family: -apple-system, 'Segoe UI', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
    }

    .app {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100dvh;
      background: var(--bg);
    }

    .page { display: none; flex-direction: column; min-height: 100dvh }
    .page.active { display: flex }

    /* ── HEADER ── */
    .header {
      background: var(--surface);
      padding: 16px 16px 0;
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo {
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-sm);
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .header-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .header-info {}

    .header-title {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .header-date {
      font-size: 12px;
      color: var(--text2);
      margin-top: 1px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-user {
      font-size: 11px;
      color: var(--text3);
      padding-bottom: 12px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--primary);
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      margin-bottom: 8px;
      font-weight: 500;
      text-decoration: none;
    }

    /* ── SEARCH ── */
    .search-wrap {
      position: relative;
      margin: 16px;
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 16px;
      pointer-events: none;
    }

    .search-field {
      width: 100%;
      padding: 13px 14px 13px 42px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .search-field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-s);
    }

    .search-field::placeholder {
      color: var(--text3);
    }

    /* ── FILTERS ── */
    .filter-row {
      display: flex;
      gap: 8px;
      padding: 0 16px 16px;
      flex-wrap: wrap;
    }

    .filter-chip {
      font-size: 12px;
      padding: 8px 14px;
      border-radius: var(--radius-full);
      border: 1.5px solid var(--border);
      cursor: pointer;
      background: var(--surface);
      color: var(--text2);
      transition: all 0.15s;
      font-weight: 500;
    }

    .filter-chip:active { transform: scale(0.95) }
    .filter-chip.active { background: var(--primary); color: #fff; border-color: var(--primary) }

    /* ── CONTENT ── */
    .content {
      flex: 1;
      padding: 0 16px 100px;
      overflow-y: auto;
    }

    /* ── SECTION LABEL ── */
    .section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text3);
      margin-bottom: 12px;
      padding: 0 4px;
    }

    /* ── STATS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--surface);
      border-radius: var(--radius-sm);
      padding: 14px 12px;
      text-align: center;
      box-shadow: var(--shadow-card);
      border: 1px solid var(--border);
    }

    .stat-val {
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .stat-lbl {
      font-size: 10px;
      color: var(--text2);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── MEMBER CARDS ── */
    .member-card {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: var(--shadow-card);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }

    .member-card:active {
      transform: scale(0.98);
      box-shadow: var(--shadow-sm);
    }

    .member-card-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .member-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .avatar-miembro {
      background: var(--primary-l);
      color: var(--primary-d);
    }

    .avatar-visitante {
      background: var(--blue-l);
      color: var(--blue);
    }

    .avatar-inactivo {
      background: var(--gray-l);
      color: var(--gray);
    }

    .member-info {
      flex: 1;
      min-width: 0;
    }

    .member-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .member-meta {
      font-size: 12px;
      color: var(--text2);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .member-contact {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--primary);
      text-decoration: none;
    }

    .tipo-badge {
      font-size: 10px;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-weight: 500;
    }

    .tipo-miembro {
      background: var(--primary-s);
      color: var(--primary-d);
    }

    .tipo-visitante {
      background: var(--blue-l);
      color: var(--blue);
    }

    .tipo-nino {
      background: var(--amber-l);
      color: #854F0B;
    }

    .tipo-colaborador {
      background: var(--primary-l);
      color: var(--primary-d);
    }

    .tipo-otro {
      background: var(--gray-l);
      color: var(--gray);
    }

    .member-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .inactivo-badge {
      font-size: 11px;
      color: var(--gray);
      font-weight: 500;
    }

    /* ── BUTTONS ── */
    .btn-primary {
      width: 100%;
      padding: 15px;
      border-radius: var(--radius-sm);
      border: none;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-primary:active {
      opacity: 0.85;
      transform: scale(0.98);
    }

    .btn-secondary {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 10px;
      transition: all 0.15s;
    }

    .btn-secondary:active {
      background: var(--gray-l);
    }

    .btn-danger {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--red);
      background: transparent;
      color: var(--red);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .btn-sm {
      padding: 10px 16px;
      border-radius: var(--radius-xs);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-sm:active {
      background: var(--gray-l);
      transform: scale(0.95);
    }

    /* ── INPUTS ── */
    .form-group {
      margin-bottom: 16px;
    }

    .form-label {
      font-size: 12px;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 6px;
      display: block;
    }

    .input-field {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .input-field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-s);
    }

    .input-field::placeholder {
      color: var(--text3);
    }

    select.input-field {
      cursor: pointer;
    }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(2px);
    }

    .modal-overlay.show {
      display: flex;
      animation: fadeIn 0.2s ease;
    }

    .modal {
      background: var(--surface);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 24px 20px 36px;
      width: 100%;
      max-width: 480px;
      max-height: 88vh;
      overflow-y: auto;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }

    /* ── EMPTY & LOADING ── */
    .loading {
      text-align: center;
      padding: 48px 20px;
      color: var(--text2);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--text2);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
    }

    .empty p {
      font-size: 14px;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--text);
      color: var(--bg);
      padding: 12px 24px;
      border-radius: var(--radius-full);
      font-size: 14px;
      font-weight: 500;
      z-index: 999;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .toast.error {
      background: var(--red);
    }

    /* ── FAB ── */
    .fab {
      position: fixed;
      bottom: 28px;
      right: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      border: none;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(29, 158, 117, 0.35);
      transition: all 0.2s;
      z-index: 50;
    }

    .fab:active {
      transform: scale(0.92);
      box-shadow: 0 4px 12px rgba(29, 158, 117, 0.25);
    }
  </style>
</head>
<body>

<script>
(function() {
  const token = localStorage.getItem('iglesia_token');
  if (!token) { window.location.href = '/login.html'; return; }
  try {
    const p = JSON.parse(atob(token.split('.')[1]));
    if (p.exp * 1000 < Date.now()) { localStorage.clear(); window.location.href = '/login.html'; }
  } catch { window.location.href = '/login.html'; }
})();

const _origFetch = window.fetch;
window.fetch = function(url, opts = {}) {
  if (typeof url === 'string' && url.startsWith('/api')) {
    const token = localStorage.getItem('iglesia_token');
    if (token) opts.headers = { ...opts.headers, 'Authorization': 'Bearer ' + token };
  }
  return _origFetch(url, opts);
};
</script>

<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="header-left">
        <a href="/porteria.html" class="back-btn">← Volver</a>
      </div>
    </div>
    <div class="header-title" style="margin-bottom:12px">Miembros</div>
  </div>

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-field" id="search-input" placeholder="Buscar por nombre...">
  </div>

  <div class="filter-row" id="filter-row">
    <div class="filter-chip active" data-filter="todos">Todos</div>
    <div class="filter-chip" data-filter="miembro">Miembros</div>
    <div class="filter-chip" data-filter="visitante">Visitantes</div>
    <div class="filter-chip" data-filter="nino">Niños</div>
    <div class="filter-chip" data-filter="inactivo">Inactivos</div>
  </div>

  <div class="content" id="main-content">
    <div class="loading"><div class="spinner"></div>Cargando...</div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="abrirModalNuevo()">+</button>

<!-- Modal nuevo/editar -->
<div class="modal-overlay" id="modal-form">
  <div class="modal">
    <div class="modal-title" id="form-titulo">Nuevo miembro</div>

    <div class="form-group">
      <label class="form-label">Nombre *</label>
      <input type="text" class="input-field" id="f-nombre" placeholder="Nombre">
    </div>

    <div class="form-group">
      <label class="form-label">Apellido *</label>
      <input type="text" class="input-field" id="f-apellido" placeholder="Apellido">
    </div>

    <div class="form-group">
      <label class="form-label">Tipo</label>
      <select class="input-field" id="f-tipo">
        <option value="miembro">Miembro</option>
        <option value="visitante">Visitante</option>
        <option value="nino">Niño</option>
        <option value="colaborador">Colaborador</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Teléfono</label>
      <input type="tel" class="input-field" id="f-telefono" placeholder="300 000 0000">
    </div>

    <div class="form-group">
      <label class="form-label">Correo</label>
      <input type="email" class="input-field" id="f-email" placeholder="correo@ejemplo.com">
    </div>

    <div class="form-group">
      <label class="form-label">Estado</label>
      <select class="input-field" id="f-estado">
        <option value="activo">Activo</option>
        <option value="inactivo">Inactivo</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="btn-primary" style="flex:1" onclick="guardarMiembro()">Guardar</button>
      <button class="btn-danger" style="flex:1;display:none" id="btn-eliminar" onclick="eliminarMiembro()">Eliminar</button>
      <button class="btn-secondary" style="flex:1" onclick="cerrarModal()">Cancelar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api';
let miembros = [];
let editandoId = null;
let filtroActual = 'todos';

async function api(method, path, body) {
  const r = await fetch(API + path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
  const j = await r.json();
  if (!r.ok) throw new Error(j.error || 'Error');
  return j.data ?? j;
}

function toast(msg, isError = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (isError ? ' error' : '');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

function cerrarModal() {
  document.getElementById('modal-form').classList.remove('show');
}

function iniciales(nombre, apellido) {
  return ((nombre || '')[0] + (apellido || '')[0]).toUpperCase() || '?';
}

function tipoAvatar(tipo, estado) {
  if (estado === 'inactivo') return 'avatar-inactivo';
  if (tipo === 'visitante') return 'avatar-visitante';
  if (tipo === 'nino') return 'avatar-visitante';
  return 'avatar-miembro';
}

function tipoLabel(tipo) {
  const map = { miembro: 'Miembro', visitante: 'Visitante', nino: 'Niño', colaborador: 'Colaborador' };
  return map[tipo] || tipo || '—';
}

function tipoBadgeClass(tipo) {
  const map = { miembro: 'tipo-miembro', visitante: 'tipo-visitante', nino: 'tipo-nino', colaborador: 'tipo-colaborador' };
  return map[tipo] || 'tipo-otro';
}

function filtroMiembros(lista) {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  return lista.filter(m => {
    const matchQ = !q ||
      (m.nombre + ' ' + m.apellido).toLowerCase().includes(q) ||
      (m.telefono || '').includes(q) ||
      (m.email || '').toLowerCase().includes(q);
    const matchFiltro =
      filtroActual === 'todos' ? true :
      filtroActual === 'inactivo' ? m.estado === 'inactivo' :
      m.tipo === filtroActual && m.estado !== 'inactivo';
    return matchQ && matchFiltro;
  });
}

function stats(lista) {
  return {
    total: lista.length,
    activos: lista.filter(m => m.estado === 'activo').length,
    inactivos: lista.filter(m => m.estado === 'inactivo').length
  };
}

function render() {
  const main = document.getElementById('main-content');
  const filtrados = filtroMiembros(miembros);
  const s = stats(filtrados);

  let html = `
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val">${s.total}</div>
        <div class="stat-lbl">Total</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--primary)">${s.activos}</div>
        <div class="stat-lbl">Activos</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--gray)">${s.inactivos}</div>
        <div class="stat-lbl">Inactivos</div>
      </div>
    </div>`;

  if (!filtrados.length) {
    main.innerHTML = html + `<div class="empty">
      <div class="empty-icon">👥</div>
      <p>No hay miembros${filtroActual !== 'todos' ? ' con ese filtro' : ''}</p>
    </div>`;
    return;
  }

  html += filtrados.map(m => {
    const avatarClass = tipoAvatar(m.tipo, m.estado);
    const nombre = (m.nombre + ' ' + m.apellido).trim() || 'Sin nombre';
    const badgeClass = tipoBadgeClass(m.tipo);

    return `<div class="member-card" onclick="abrirModalEditar('${m.id}')">
      <div class="member-card-header">
        <div class="member-avatar ${avatarClass}">${iniciales(m.nombre, m.apellido)}</div>
        <div class="member-info">
          <div class="member-name">
            ${nombre}
            ${m.estado === 'inactivo' ? '<span class="inactivo-badge">(inactivo)</span>' : ''}
          </div>
          <div class="member-meta">
            <span class="tipo-badge ${badgeClass}">${tipoLabel(m.tipo)}</span>
            ${m.telefono ? `<span>📞 <a href="tel:${m.telefono}" class="member-contact" onclick="event.stopPropagation()">${m.telefono}</a></span>` : ''}
            ${m.email ? `<span>✉️ ${m.email}</span>` : ''}
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  main.innerHTML = html;
}

async function cargarMiembros() {
  try {
    const data = await api('GET', '/miembros?limit=200');
    miembros = Array.isArray(data) ? data : [];
    render();
  } catch (e) {
    document.getElementById('main-content').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div><p>Error al cargar</p></div>`;
  }
}

function abrirModalNuevo() {
  editandoId = null;
  document.getElementById('form-titulo').textContent = 'Nuevo miembro';
  document.getElementById('btn-eliminar').style.display = 'none';
  document.getElementById('f-nombre').value = '';
  document.getElementById('f-apellido').value = '';
  document.getElementById('f-tipo').value = 'miembro';
  document.getElementById('f-telefono').value = '';
  document.getElementById('f-email').value = '';
  document.getElementById('f-estado').value = 'activo';
  document.getElementById('modal-form').classList.add('show');
}

function abrirModalEditar(id) {
  const m = miembros.find(x => x.id === id);
  if (!m) return;
  editandoId = id;
  document.getElementById('form-titulo').textContent = 'Editar miembro';
  document.getElementById('btn-eliminar').style.display = 'block';
  document.getElementById('f-nombre').value = m.nombre || '';
  document.getElementById('f-apellido').value = m.apellido || '';
  document.getElementById('f-tipo').value = m.tipo || 'miembro';
  document.getElementById('f-telefono').value = m.telefono || '';
  document.getElementById('f-email').value = m.email || '';
  document.getElementById('f-estado').value = m.estado || 'activo';
  document.getElementById('modal-form').classList.add('show');
}

async function guardarMiembro() {
  const nombre = document.getElementById('f-nombre').value.trim();
  const apellido = document.getElementById('f-apellido').value.trim();
  const tipo = document.getElementById('f-tipo').value;
  const telefono = document.getElementById('f-telefono').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const estado = document.getElementById('f-estado').value;

  if (!nombre || !apellido) { toast('Nombre y apellido son requeridos', true); return; }

  const payload = { nombre, apellido, tipo, telefono: telefono || null, email: email || null, estado };

  try {
    if (editandoId) {
      await api('PATCH', `/miembros/${editandoId}`, payload);
      const idx = miembros.findIndex(x => x.id === editandoId);
      if (idx !== -1) miembros[idx] = { ...miembros[idx], ...payload };
      toast('Miembro actualizado');
    } else {
      const data = await api('POST', '/miembros', payload);
      miembros.unshift({ id: data.id, ...payload });
      toast('Miembro registrado');
    }
    cerrarModal();
    render();
  } catch (e) {
    toast('Error: ' + e.message, true);
  }
}

async function eliminarMiembro() {
  if (!editandoId) return;
  if (!confirm('¿Desactivar este miembro?')) return;
  try {
    await api('DELETE', `/miembros/${editandoId}`);
    miembros = miembros.filter(m => m.id !== editandoId);
    cerrarModal();
    toast('Miembro desactivado');
    render();
  } catch (e) {
    toast('Error: ' + e.message, true);
  }
}

// Filtros
document.getElementById('filter-row').addEventListener('click', e => {
  const chip = e.target.closest('.filter-chip');
  if (!chip) return;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  chip.classList.add('active');
  filtroActual = chip.dataset.filter;
  render();
});

// Búsqueda en vivo
document.getElementById('search-input').addEventListener('input', render);

cargarMiembros();
</script>
